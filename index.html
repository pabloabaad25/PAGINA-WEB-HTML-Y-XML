<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Electro Events</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            font-family: Georgia;
            background-color: #111;
        }

        .navbar {
            background-color: var(--dark-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .logo {
            color: var(--neon-cyan);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan); /*EFECTO NEON!*/
        }

        /*MENU DESPLEGABLE - LINEUP*/
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-contenido {
            display: none;
            position: absolute;
            background-color: #1a1a1a;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 1;
            top: 100%;
        }

        .dropdown:hover .dropdown-contenido {
            display: block;
        }

        .dropdown-contenido a {
            padding: 12px 16px;
            display: block;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Electro Events</div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li class="dropdown">
                <a href="#artistas">Lineup ▼</a>
                <div class="dropdown-contenido">
                    <a href="#">David Guetta</a>
                    <a href="#">Alan Walker</a>
                    <a href="#">Dimitri Vegas & Like Mike</a>
                    <a href="#">Tiesto</a>
                </div>
            </li>
            <li><a href="#tickets">Tickets</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

</body>
</html>
